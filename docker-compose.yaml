version: '3.8'

services:
  postgres:
    container_name: postgres
    restart: always
    image: postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: some_db
      POSTGRES_PASSWORD: somepassword
    volumes:
        - "./dbdata:/var/lib/postgresql"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
